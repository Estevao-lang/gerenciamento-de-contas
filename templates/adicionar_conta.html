{% extends "base.html" %}

{% block content %}
<div class="form-container">
  <div class="form-header">
    <h2><i class="fas fa-plus-circle"></i> Adicionar Nova Conta</h2>
    <a href="{{ url_for('listar_contas') }}" class="btn-back">
      <i class="fas fa-arrow-left"></i> Voltar
    </a>
  </div>

  <form method="POST" class="account-form">
    <div class="form-group">
      <label for="descricao" class="form-label">
        <i class="fas fa-file-alt"></i> Descrição
      </label>
      <input type="text" id="descricao" name="descricao" class="form-input" required placeholder="Ex: Conta de luz de julho">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="valor" class="form-label">
          <i class="fas fa-money-bill-wave"></i> Valor (R$)
        </label>
        <input type="number" id="valor" name="valor" class="form-input" step="0.01" required placeholder="0,00">
      </div>

      <div class="form-group">
        <label for="data_vencimento" class="form-label">
          <i class="fas fa-calendar-day"></i> Data de Vencimento
        </label>
        <input type="date" id="data_vencimento" name="data_vencimento" class="form-input" required>
      </div>
    </div>

    <div class="form-group">
      <label for="categoria" class="form-label">
        <i class="fas fa-tag"></i> Categoria
      </label>
      <select id="categoria" name="categoria" class="form-select">
        <option value="Aluguel"><i class="fas fa-home"></i> Aluguel</option>
        <option value="Luz"><i class="fas fa-lightbulb"></i> Luz</option>
        <option value="Água"><i class="fas fa-tint"></i> Água</option>
        <option value="Internet"><i class="fas fa-wifi"></i> Internet</option>
        <option value="Supermercado"><i class="fas fa-shopping-cart"></i> Supermercado</option>
        <option value="Outros"><i class="fas fa-ellipsis-h"></i> Outros</option>
      </select>
    </div>

    <div class="form-group status-group">
      <span class="form-label"><i class="fas fa-check-circle"></i> Status</span>
      <div class="status-options">
        <label class="status-option">
          <input type="radio" name="paga" value="false" checked>
          <span class="status-badge status-pending">
            <i class="fas fa-clock"></i> Pendente
          </span>
        </label>
        <label class="status-option">
          <input type="radio" name="paga" value="true">
          <span class="status-badge status-paid">
            <i class="fas fa-check"></i> Pago
          </span>
        </label>
      </div>
    </div>

    <button type="submit" class="btn-submit">
      <i class="fas fa-save"></i> Salvar Conta
    </button>
  </form>
</div>
{% endblock %}
