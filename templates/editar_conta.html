{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-pencil"></i> Editar Conta</h2>
</div>

<div class="card" style="max-width:560px;margin:0 auto">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="descricao" class="form-label">Descrição</label>
                <input type="text" class="form-control" id="descricao" name="descricao"
                       value="{{ conta.descricao }}" required>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label for="valor" class="form-label">Valor (R$)</label>
                    <input type="text" class="form-control" id="valor" name="valor"
                           value="{{ '%.2f'|format(conta.valor) | replace('.', ',') }}"
                           pattern="^[0-9]{1,3}(\.[0-9]{3})*,[0-9]{2}$"
                           title="Formato: 1.234,56" required>
                </div>
                <div class="col-6">
                    <label for="data_vencimento" class="form-label">Vencimento</label>
                    <input type="date" class="form-control" id="data_vencimento"
                           name="data_vencimento"
                           value="{{ conta.data_vencimento.strftime('%Y-%m-%d') }}" required>
                </div>
            </div>

            <div class="mb-3">
                <label for="categoria" class="form-label">Categoria</label>
                <select class="form-select" id="categoria" name="categoria" required>
                    {% for cat in ['Moradia','Alimentação','Transporte','Saúde','Educação','Lazer','Serviços','Outros'] %}
                    <option value="{{ cat }}" {% if conta.categoria == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-4 form-check form-switch">
                <input class="form-check-input" type="checkbox" id="paga" name="paga"
                       {% if conta.paga %}checked{% endif %}>
                <label class="form-check-label" for="paga">Conta paga</label>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-check-circle"></i> Atualizar
                </button>
                <a href="{{ url_for('listar_contas') }}" class="btn btn-outline-secondary">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
