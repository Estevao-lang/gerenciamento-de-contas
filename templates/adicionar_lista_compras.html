{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2><i class="bi bi-cart-plus"></i> Nova Lista de Compras</h2>
    
    <form method="POST">
        <div class="mb-3">
            <label for="titulo" class="form-label">Título da Lista</label>
            <input type="text" class="form-control" id="titulo" name="titulo" required>
        </div>
        
        <h4 class="mt-4">Itens da Lista</h4>
        
        <div id="itens-container">
            <div class="item mb-3 border p-3">
                <div class="row">
                    <div class="col-md-6">
                        <label class="form-label">Descrição do Item</label>
                        <input type="text" class="form-control" name="item_descricao[]" required>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Valor (R$)</label>
                        <input type="text" class="form-control" name="item_valor[]" pattern="^[0-9]{1,3}(\.[0-9]{3})*,[0-9]{2}$" title="Use formato: 1.234,56" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="button" class="btn btn-danger btn-remover" style="display: none;">
                            <i class="bi bi-trash"></i> Remover
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
        <button type="button" id="btn-adicionar-item" class="btn btn-secondary mb-3">
            <i class="bi bi-plus-circle"></i> Adicionar Item
        </button>
        
        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
            <a href="{{ url_for('listar_listas_compras') }}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-primary">Salvar Lista</button>
        </div>
    </form>
</div>

<script>
    document.getElementById('btn-adicionar-item').addEventListener('click', function() {
        const container = document.getElementById('itens-container');
        const novoItem = container.firstElementChild.cloneNode(true);
        
        // Limpar valores
        novoItem.querySelector('input[name="item_descricao[]"]').value = '';
        novoItem.querySelector('input[name="item_valor[]"]').value = '';
        
        // Mostrar botão de remover
        novoItem.querySelector('.btn-remover').style.display = 'block';
        novoItem.querySelector('.btn-remover').addEventListener('click', function() {
            container.removeChild(novoItem);
        });
        
        container.appendChild(novoItem);
    });

    // Ativar botões de remover para itens existentes
    document.querySelectorAll('.btn-remover').forEach(btn => {
        if (btn.style.display === 'none') {
            btn.addEventListener('click', function() {
                this.closest('.item').remove();
            });
        }
    });
</script>
{% endblock %}
