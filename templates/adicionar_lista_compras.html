{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-cart-plus"></i> Nova Lista de Compras</h2>
    <a href="{{ url_for('listar_listas_compras') }}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left"></i> Voltar
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="POST" id="form-lista" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="mb-3">
                <label for="titulo" class="form-label">Título da Lista</label>
                <input type="text" class="form-control" id="titulo" name="titulo"
                       placeholder="Ex: Mercado da semana, churrasco..." required>
            </div>

            <div class="d-flex align-items-center justify-content-between mb-2">
                <h5 class="mb-0"><i class="bi bi-list-ul"></i> Itens</h5>
                <div class="text-end">
                    <div class="text-muted" style="font-size:.8rem">Quantidade total: <strong id="qtd-geral">0</strong> un.</div>
                    <span class="text-muted" style="font-size:.85rem">Total estimado:</span>
                    <strong id="total-geral" style="color:var(--primary);font-size:1.1rem;margin-left:.4rem">R$ 0,00</strong>
                </div>
            </div>

            <div id="itens-container">
                <div class="item-row card mb-2" style="background:var(--bg);border:1px solid var(--border)">
                    <div class="card-body" style="padding:.75rem">
                        <div class="row g-2 align-items-end">
                            <div class="col-12 col-lg-4">
                                <label class="form-label form-label-sm">Produto</label>
                                <input type="text" class="form-control form-control-sm" name="item_descricao[]"
                                       placeholder="Ex: Arroz, Feijão..." required>
                            </div>
                            <div class="col-4 col-lg-2">
                                <label class="form-label form-label-sm">Qtd</label>
                                <input type="number" class="form-control form-control-sm item-qtd"
                                       name="item_quantidade[]" value="1" min="1" max="999">
                            </div>
                            <div class="col-8 col-lg-2">
                                <label class="form-label form-label-sm">Valor unitário</label>
                                <input type="text" class="form-control form-control-sm item-valor"
                                       name="item_valor[]" placeholder="0,00"
                                       pattern="^[0-9]{1,3}(\.[0-9]{3})*,[0-9]{2}$"
                                       title="Formato: 1.234,56" required>
                            </div>
                            <div class="col-12 col-lg-3">
                                <label class="form-label form-label-sm">Foto do item</label>
                                <input type="file" class="form-control form-control-sm item-foto"
                                       name="item_foto[]" accept="image/png,image/jpeg,image/webp" capture="environment">
                                <div class="form-text">Opcional, até 2 MB.</div>
                            </div>
                            <div class="col-12 col-lg-1 d-flex align-items-end gap-2">
                                <span class="item-subtotal text-muted" style="font-size:.82rem;white-space:nowrap">= R$ 0,00</span>
                                <button type="button" class="btn btn-sm btn-outline-danger btn-remover ms-auto" style="display:none">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button type="button" id="btn-adicionar-item" class="btn btn-outline-secondary btn-sm mb-3">
                <i class="bi bi-plus-circle"></i> Adicionar item
            </button>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-2">
                <a href="{{ url_for('listar_listas_compras') }}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle"></i> Salvar Lista
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function parseBRL(str) {
    if (!str) return 0;
    return parseFloat(str.replace(/\./g, '').replace(',', '.')) || 0;
}

function formatBRL(v) {
    return 'R$ ' + v.toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}

function atualizarTotais() {
    let total = 0;
    let quantidadeTotal = 0;
    document.querySelectorAll('.item-row').forEach(row => {
        const qtd = parseInt(row.querySelector('.item-qtd').value) || 1;
        const valor = parseBRL(row.querySelector('.item-valor').value);
        const sub = qtd * valor;
        row.querySelector('.item-subtotal').textContent = '= ' + formatBRL(sub);
        total += sub;
        quantidadeTotal += qtd;
    });
    document.getElementById('qtd-geral').textContent = quantidadeTotal;
    document.getElementById('total-geral').textContent = formatBRL(total);
}

function aplicarMascaraValor(input) {
    input.addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');
        v = (parseInt(v || '0', 10) / 100).toFixed(2);
        v = v.replace('.', ',').replace(/(\d)(?=(\d{3})+,)/g, '$1.');
        e.target.value = v;
        atualizarTotais();
    });
}

function aplicarEventosItem(row) {
    aplicarMascaraValor(row.querySelector('.item-valor'));
    row.querySelector('.item-qtd').addEventListener('input', atualizarTotais);
    row.querySelector('.btn-remover').addEventListener('click', function() {
        row.remove();
        atualizarTotais();
    });
}

aplicarEventosItem(document.querySelector('.item-row'));

document.getElementById('btn-adicionar-item').addEventListener('click', function() {
    const original = document.querySelector('.item-row');
    const novo = original.cloneNode(true);
    novo.querySelector('input[name="item_descricao[]"]').value = '';
    novo.querySelector('.item-qtd').value = '1';
    novo.querySelector('.item-valor').value = '';
    novo.querySelector('.item-foto').value = '';
    novo.querySelector('.item-subtotal').textContent = '= R$ 0,00';
    novo.querySelector('.btn-remover').style.display = 'inline-block';
    aplicarEventosItem(novo);
    document.getElementById('itens-container').appendChild(novo);
    atualizarTotais();
});

atualizarTotais();
</script>
{% endblock %}
