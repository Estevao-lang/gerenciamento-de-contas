{% extends "base.html" %}

{% block content %}
<div style="max-width:400px;margin:2.5rem auto">
    <div class="text-center mb-4">
        <i class="bi bi-wallet2" style="font-size:3rem;color:var(--primary)"></i>
        <h2 style="font-weight:800;margin-top:.5rem">FinanceFlow</h2>
        <p class="text-muted" style="font-size:.9rem">Entre na sua conta</p>
    </div>

    <div class="card">
        <div class="card-body">
            <form method="POST" autocomplete="on">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="seu@email.com" autocomplete="email" required>
                </div>
                <div class="mb-4">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="password" class="form-control" id="senha" name="senha"
                           placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </div>
            </form>
        </div>
    </div>

    <p class="text-center mt-3 text-muted" style="font-size:.88rem">
        Não tem conta?
        <a href="{{ url_for('registro') }}" style="color:var(--primary);font-weight:700">Registre-se grátis</a>
    </p>
</div>
{% endblock %}
