{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h2><i class="bi bi-person-circle"></i> Meu Perfil</h2>
</div>

<div class="card" style="max-width:560px;margin:0 auto">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome Completo</label>
                <input type="text" class="form-control" id="nome" name="nome"
                       value="{{ current_user.nome }}" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ current_user.email }}" required>
            </div>
            <div class="row g-3 mb-4">
                <div class="col-6">
                    <label for="saldo" class="form-label">Saldo (R$)</label>
                    <input type="text" class="form-control" id="saldo" name="saldo"
                           value="{{ '%.2f' | format(current_user.saldo) | replace('.', ',') }}" required>
                    <div class="form-text">Formato: 1.234,56</div>
                </div>
                <div class="col-6">
                    <label for="limite_alerta" class="form-label">Limite Alerta (R$)</label>
                    <input type="text" class="form-control" id="limite_alerta" name="limite_alerta"
                           value="{{ '%.2f' | format(current_user.limite_alerta) | replace('.', ',') }}" required>
                    <div class="form-text">Receba alerta ao ultrapassar</div>
                </div>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="bi bi-save"></i> Salvar Alterações
                </button>
                <a href="{{ url_for('logout') }}" class="btn btn-outline-danger">
                    <i class="bi bi-box-arrow-right"></i> Sair da Conta
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
